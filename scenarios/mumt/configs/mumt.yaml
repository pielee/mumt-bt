scenario:
  environment: scenarios.mumt

agent:
  namespaces: "/F16_UAV"            # = agent_id "F16_UAV" (XML own_name 미지정 시 기본값). --ns로 덮어쓰기 가능
  behavior_tree_xml: "default_bt.xml"

bt_runner:
  bt_tick_rate: 10.0
  bt_visualiser:
    enabled: True
    screen_width: 600
    screen_height: 600
  profiling_mode: False
